name: 自动双源无损强行合并-备用线

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch: 

permissions: write-all

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/HKL/refs/heads/main/ok%E6%B5%B7%E8%B1%9A.json" -o datas/haitun.json

    - name: Text Merge JSON
      run: |
        python modify_config.py

    - name: Analyze changes and Send Telegram Notification
      env:
        TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        git config --global core.quotepath false
        git add datas/
        
        if ! git diff --cached --exit-code --quiet; then
          echo "检测到文件变动，开始封装通知消息..."
          
          CURRENT_TIME=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M")
          
          # 读取 Python 精准对比生成的无敏感格式纯文本
          ADDED_SITES=""
          DELETED_SITES=""
          
          if [ -f "datas/added_sites.txt" ]; then
            # 替换普通换行为 Telegram 专用的 URL 换行编码 %0A
            ADDED_SITES=$(cat datas/added_sites.txt | sed ':a;N;$!ba;s/\n/%0A/g')
          fi
          if [ -f "datas/deleted_sites.txt" ]; then
            DELETED_SITES=$(cat datas/deleted_sites.txt | sed ':a;N;$!ba;s/\n/%0A/g')
          fi
          
          LATEST_FILE=$(cat datas/最新接口文件名.txt || echo "蝴蝶影视纯净版.json")
          SUBSCRIBE_URL="https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main/datas/${LATEST_FILE}"
          
          MSG="🔔 *蝴蝶影视纯净版接口变更通知* 🔔%0A%0A"
          MSG="${MSG}📅 *更新时间*：${CURRENT_TIME} (北京时间)%0A"
          MSG="${MSG}🚀 *变动说明*：检测到数据源更新，新接口配置已上链！%0A"
          
          if [ ! -z "$ADDED_SITES" ] || [ ! -z "$DELETED_SITES" ]; then
            MSG="${MSG}%0A📝 *【 变动明细 】*%0A"
            if [ ! -z "$ADDED_SITES" ]; then
              MSG="${MSG}${ADDED_SITES}%0A"
            fi
            if [ ! -z "$DELETED_SITES" ]; then
              MSG="${MSG}${DELETED_SITES}%0A"
            fi
            MSG="${MSG}📊 *━━━━━━━━━━━━━━━*%0A"
          fi
          
          MSG="${MSG}%0A🔗 *【 订阅链接 】*：%0A\`${SUBSCRIBE_URL}\`%0A"
          MSG="${MSG}%0A👑 电视端若遇断流，请重启软件，最新密码请至频道（@huliys9）查看！"
          
          if [ ! -z "$TG_TOKEN" ] && [ ! -z "$TG_CHAT_ID" ]; then
            # 使用 URL 编码形式传递，避免 curl 参数中 Markdown 解析器因为字符断流而出错
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "parse_mode=Markdown" \
              -d "text=${MSG}"
            echo "Telegram 通知已成功分发！"
          else
            echo "⚠️ 提示：未检测到 TG_TOKEN 或 TG_CHAT_ID，跳过通知发送。"
          fi
          
          # 清除本次临时产生的文件，防止下一次脚本重复污染
          rm -f datas/added_sites.txt datas/deleted_sites.txt
        else
          echo "接口无实际变化，跳过通知流程。"
        fi

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global core.quotepath false
        
        git add datas/
        
        if ! git diff --cached --exit-code --quiet; then
          git commit -m "双源自适应硬核净化合并 (蝴蝶影视纯净版系列): $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        else
          echo "未检测到内容变化，无需提交。"
        fi
