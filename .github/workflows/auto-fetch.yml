name: 自动双源无损强行合并-备用线

on:
  schedule:
    # 🎯 避开整点阻塞，UTC 时间 0:00 和 12:00，换算北京时间刚好是早上 08:00 和晚上 20:00 准时合流清洗
    - cron: '0 0,12 * * *'
  workflow_dispatch: 

# 🌟 显式强制赋予工作流写入权限，解决 128 报错的关键
permissions: write-all

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 1. 下载两个标准公共大底包
    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/GHK/refs/heads/main/海豚666.json" -o datas/haitun.json

    # 2. 执行安全对象级绿色过滤与自适应改名脚本
    - name: Text Merge JSON
      run: |
        python modify_config.py

    # 3. 核心修正：全量文件比对与暂存机制，彻底杜绝提交空报错与死循环
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 🌟 优化 1：直接暂存 datas 目录下的所有变动，防止遗漏任何生成的 json 或 txt 文件导致报错
        git add datas/
        
        # 🌟 优化 2：改用更安全的缓存区比对命令。只有在文件真正被 git add 暂存且有变化时才执行提交
        if ! git diff --cached --exit-code --quiet; then
          git commit -m "双源自适应硬核净化合并 (蝴蝶影视纯净版系列): $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        else
          echo "所有生成文件均无任何内容变化，跳过本次提交。"
        fi
