name: 自动双源无损强行合并-备用线

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch: 

permissions: write-all

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Fetch target files
      run: |
        mkdir -p datas
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/cnb.json
        curl -L "https://raw.githubusercontent.com/FGBLH/HKL/refs/heads/main/ok%E6%B5%B7%E8%B1%9A.json" -o datas/haitun.json

    - name: Text Merge JSON
      run: |
        python modify_config.py

    - name: Analyze changes and Send Telegram Notification
      env:
        TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        git config --global core.quotepath false
        git add datas/
        
        if ! git diff --cached --exit-code --quiet; then
          echo "检测到接口文件已发生更新，正在提取变更明细..."
          
          CURRENT_TIME=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M")
          
          ADDED_SITES=$(git diff --cached -U0 | grep '^[+][[:space:]]*"name":' | head -n 5 | sed -E 's/^[+][[:space:]]*"name":[[:space:]]*"([^"]+)".*/➕ ` \1 `/g' || true)
          DELETED_SITES=$(git diff --cached -U0 | grep '^[-][[:space:]]*"name":' | head -n 5 | sed -E 's/^[-][[:space:]]*"name":[[:space:]]*"([^"]+)".*/➖ ` \1 `/g' || true)
          
          MSG="🔔 *蝴蝶影视纯净版接口变更明细通知* 🔔%0A%0A"
          MSG="${MSG}📅 *更新时间*：${CURRENT_TIME} (北京时间)%0A"
          MSG="${MSG}🚀 *变动说明*：检测到上游数据源更新或手工区线路调整，新接口配置已全自动编译上链！%0A"
          
          if [ ! -z "$ADDED_SITES" ] || [ ! -z "$DELETED_SITES" ]; then
            MSG="${MSG}%0A📊 *━━━━━━━━━━━━━━━*%0A📝 *【 变动明细预览 】*%0A"
            if [ ! -z "$ADDED_SITES" ]; then
              MSG="${MSG}${ADDED_SITES}%0A"
            fi
            if [ ! -z "$DELETED_SITES" ]; then
              MSG="${MSG}${DELETED_SITES}%0A"
            fi
            MSG="${MSG}📊 *━━━━━━━━━━━━━━━*%0A"
          fi
          
          MSG="${MSG}%0A👑 纯净版链接已在后台无缝更新，更新接口即可，若电视端遇到断流请尝试重启软件或及时前往频道（@huliys9）获取当前最新密码锁！"
          
          if [ ! -z "$TG_TOKEN" ] && [ ! -z "$TG_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "parse_mode=Markdown" \
              -d "text=${MSG}"
            echo "Telegram 频道通知发送成功！"
          else
            echo "⚠️ 提示：未检测到绑定的 TG_TOKEN 或 TG_CHAT_ID，跳过通知发送。"
          fi
        else
          echo "接口文件无任何实际内容变化，跳过通知流程。"
        fi

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global core.quotepath false
        
        git add datas/
        
        if ! git diff --cached --exit-code --quiet; then
          git commit -m "双源自适应硬核净化合并 (蝴蝶影视纯净版系列): $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        else
          echo "所有生成文件均无任何内容变化，跳过本次提交。"
        fi
